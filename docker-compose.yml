services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.0.3
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true  # ✅ Security abilitata
      - ELASTIC_PASSWORD=${ES_PASSWORD}  # Password per elastic user
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      # ⭐ NON specificare manualmente i path SSL, lascia che ES li generi
    networks:
      - elastic-network
    ports:
      - 9200:9200
    volumes:
      - es-data:/usr/share/elasticsearch/data
      - es-certs:/usr/share/elasticsearch/config/certs
    healthcheck:
      test: ["CMD-SHELL", "curl -k -u elastic:${ES_PASSWORD} https://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  yprovsearch:
    build: .
    container_name: yprovsearch
    depends_on:
      elasticsearch:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - elastic-network
    ports:
      - 8001:8001
    volumes:
      - es-certs:/app/certs:ro  # Monta i certificati generati da ES

networks:
  elastic-network:
    driver: bridge

volumes:
  es-data:
  es-certs: